name: Escala Anestesiologia

on:
  workflow_dispatch:
    inputs:
      semana:
        description: 'Semana (yyyy-MM-dd)'
        required: true
        type: string

jobs:
  alocar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr alocacao
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          python src/escala.py \
            --payload data/payload.json \
            --output data/resultado.json

      - name: Commit resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultado.json
          git diff --staged --quiet || git commit -m "resultado escala ${{ github.event.inputs.semana }}"
          git push
